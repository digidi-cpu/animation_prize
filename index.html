<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digit Game: Ticket & NFT FX</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #05050f;
            --primary: #ff6b35;
            --gold: #ffcc00;
            --gold-dark: #b59410;
            --tg-blue: #24A1DE;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- DEBUG TRIGGER --- */
        .debug-btn {
            position: fixed; bottom: 30px; z-index: 9999;
            background: var(--primary); border: none; color: white;
            padding: 15px 30px; border-radius: 50px;
            font-family: 'Orbitron', sans-serif; font-weight: 900;
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.5);
            cursor: pointer; transition: transform 0.1s;
        }
        .debug-btn:active { transform: scale(0.95); }

        /* --- OVERLAY --- */
        .fx-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; visibility: hidden;
            transition: all 0.4s ease;
            backdrop-filter: blur(0px);
        }
        .fx-overlay.active {
            visibility: visible;
            background: rgba(0,0,0,0.94);
            backdrop-filter: blur(12px);
        }

        /* --- WINDOWS --- */
        .window-container { width: 90%; max-width: 350px; position: relative; }

        .reward-window {
            text-align: center; display: none;
            animation: windowIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes windowIn {
            from { opacity: 0; transform: scale(0.7) translateY(50px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .reward-window.active { display: block; }

        /* --- SVG ICON ENGINE --- */
        .icon-svg {
            display: inline-block; width: 100%; height: 100%;
            background-color: currentColor;
            mask-repeat: no-repeat; mask-position: center; mask-size: contain;
            -webkit-mask-repeat: no-repeat; -webkit-mask-position: center; -webkit-mask-size: contain;
        }
        .mask-ticket { -webkit-mask-image: url('assets/ticket.svg'); mask-image: url('assets/ticket.svg'); }
        .mask-star { -webkit-mask-image: url('assets/star.svg'); mask-image: url('assets/star.svg'); }

        /* Full-color NFT Icon */
        .icon-nft {
            width: 100%; height: 100%;
            background-image: url('assets/nft.svg');
            background-size: contain; background-repeat: no-repeat; background-position: center;
        }

        /* --- UI ELEMENTS --- */
        .ticket-visual {
            width: 180px; height: 110px; margin: 0 auto 30px;
            color: var(--gold);
            filter: drop-shadow(0 0 20px rgba(255, 204, 0, 0.5));
            animation: float 4s infinite ease-in-out;
        }

        .win-title {
            font-family: 'Orbitron', sans-serif; font-size: 2.2rem;
            color: var(--gold); margin: 0;
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.5);
        }

        .win-desc { color: rgba(255,255,255,0.7); margin: 15px 0 35px; line-height: 1.5; }

        .prize-list {
            background: rgba(255,255,255,0.03); border-radius: 24px;
            padding: 24px; text-align: left;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .prize-item { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
        .prize-item:last-child { margin-bottom: 0; }
        
        .prize-icon-wrap { width: 42px; height: 42px; flex-shrink: 0; }
        .prize-info b { display: block; color: var(--gold); font-size: 1.1rem; }
        .prize-info span { font-size: 0.85rem; color: rgba(255,255,255,0.4); }

        /* --- BUTTONS --- */
        .btn-main {
            width: 100%; background: none; border: 2px solid var(--gold);
            color: var(--gold); padding: 16px; border-radius: 16px;
            font-family: 'Orbitron', sans-serif; font-weight: 900;
            text-transform: uppercase; cursor: pointer; transition: all 0.2s;
        }
        .btn-main:active { background: rgba(255,204,0,0.1); transform: scale(0.98); }

        .btn-tg {
            width: 100%; background: var(--tg-blue); color: white;
            border: none; padding: 16px; border-radius: 16px;
            font-family: 'Orbitron', sans-serif; font-weight: 900;
            text-decoration: none; display: block; box-sizing: border-box;
            text-transform: uppercase; margin-top: 20px; text-align: center;
        }

        .btn-close {
            margin-top: 25px; background: none; border: none;
            color: rgba(255,255,255,0.3); text-decoration: underline; cursor: pointer;
        }

        /* --- PARTICLES --- */
        .p { position: absolute; pointer-events: none; z-index: 1001; color: var(--gold); }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-15px) rotate(3deg); }
        }
    </style>
</head>
<body>

    <button class="debug-btn" onclick="startWinFlow()">TEST ANIMATION 🎟️</button>

    <div id="fxOverlay" class="fx-overlay">
        <div class="window-container">
            
            <div id="viewWin" class="reward-window">
                <div class="ticket-visual">
                    <div class="icon-svg mask-ticket"></div>
                </div>
                <h1 class="win-title">EPIC WIN!</h1>
                <p class="win-desc">You've earned a ticket for the Seasonal Prize Draw!</p>
                <button class="btn-main" onclick="switchView('viewPrizes')">What can I win?</button>
                <button class="btn-close" onclick="closeAll()">Close</button>
            </div>

            <div id="viewPrizes" class="reward-window">
                <h2 style="font-family: 'Orbitron'; color: var(--gold); margin-bottom: 25px; letter-spacing: 1px;">SEASONAL PRIZES</h2>
                <div class="prize-list">
                    <div class="prize-item">
                        <div class="prize-icon-wrap">
                            <div class="icon-nft"></div>
                        </div>
                        <div class="prize-info">
                            <b>10x NFT Telegram Gifts</b>
                            <span>Exclusive collectible items</span>
                        </div>
                    </div>
                    <div class="prize-item">
                        <div class="prize-icon-wrap" style="color: var(--gold);">
                            <div class="icon-svg mask-star"></div>
                        </div>
                        <div class="prize-info">
                            <b>10x Packs of 100 Stars</b>
                            <span>Telegram currency rewards</span>
                        </div>
                    </div>
                </div>
                
                <a href="#" class="btn-tg" onclick="alert('Redirecting to Channel...')">More info in Channel</a>
                <button class="btn-close" onclick="closeAll()">Back to game</button>
            </div>

        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp || {
            HapticFeedback: { notificationOccurred: (t) => console.log('Haptic Triggered:', t) }
        };

        function startWinFlow() {
            document.getElementById('fxOverlay').classList.add('active');
            switchView('viewWin');
            
            // Trigger Haptic
            tg.HapticFeedback.notificationOccurred('success');
            
            // Launch Confetti
            spawnParticles();
        }

        function switchView(v) {
            document.querySelectorAll('.reward-window').forEach(w => w.classList.remove('active'));
            document.getElementById(v).classList.add('active');
            tg.HapticFeedback.notificationOccurred('light');
        }

        function closeAll() {
            document.getElementById('fxOverlay').classList.remove('active');
        }

        function spawnParticles() {
            for (let i = 0; i < 65; i++) {
                const p = document.createElement('div');
                p.className = 'p';
                
                // Use the official Star asset for particles
                const inner = document.createElement('div');
                inner.className = 'icon-svg mask-star';
                p.appendChild(inner);

                // Random size for variety
                const size = Math.random() * 12 + 8;
                p.style.width = p.style.height = size + 'px';
                
                p.style.left = '50%';
                p.style.top = '50%';
                document.body.appendChild(p);

                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 450 + 150;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;
                const rot = Math.random() * 720 - 360;

                p.animate([
                    { transform: 'translate(-50%, -50%) scale(1) rotate(0deg)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0) rotate(${rot}deg)`, opacity: 0 }
                ], {
                    duration: Math.random() * 800 + 1000,
                    easing: 'cubic-bezier(0, .9, .57, 1)'
                }).onfinish = () => p.remove();
            }
        }
    </script>
</body>
</html>
