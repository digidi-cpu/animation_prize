<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digit Game: 3D Prize Orbit</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #030309;
            --primary: #ff6b35;
            --gold: #ffcc00;
            --gold-dark: #b59410;
            --tg-blue: #24A1DE;
            --silver: #e0e0e0;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            /* Establishes global 3D perspective */
            perspective: 1000px;
        }

        /* --- UI OVERLAY --- */
        .fx-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; visibility: hidden;
            transition: all 0.5s ease;
            backdrop-filter: blur(0px);
        }
        .fx-overlay.active {
            visibility: visible;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
        }

        .window-container { width: 100%; max-width: 400px; position: relative; }

        .reward-window {
            text-align: center; display: none;
            animation: windowIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes windowIn {
            from { opacity: 0; transform: scale(0.5) translateY(100px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .reward-window.active { display: block; }

        /* --- 3D ORBIT SCENE --- */
        .orbit-scene {
            width: 100%;
            height: 250px;
            margin-bottom: 20px;
            position: relative;
            display: flex; justify-content: center; align-items: center;
            /* Perspective for this specific scene, tilted slightly down */
            perspective: 1000px;
            perspective-origin: 50% 40%;
        }

        /* Container that handles the rotation logic */
        .orbit-wrapper {
            position: absolute;
            width: 1px; height: 1px; /* Center point */
            transform-style: preserve-3d;
            animation: orbitContainer 10s infinite linear;
        }

        /* --- THE TICKET (Center, Gradient) --- */
        .main-ticket {
            position: absolute;
            width: 180px; height: 110px;
            /* Centering itself */
            left: -90px; top: -55px; 
            
            /* Apply Gradient through Mask */
            background-image: linear-gradient(135deg, var(--gold), var(--gold-dark));
            
            mask-image: url('assets/ticket.svg');
            -webkit-mask-image: url('assets/ticket.svg');
            mask-repeat: no-repeat; mask-position: center; mask-size: contain;
            -webkit-mask-repeat: no-repeat; -webkit-mask-position: center; -webkit-mask-size: contain;
            
            filter: drop-shadow(0 0 25px rgba(255, 204, 0, 0.6));
            
            /* Ensures it stays flat in Z-space but can be passed by NFTs */
            transform: translateZ(0); 
            z-index: 10; /* Base Layer */
        }

        /* --- NFT ITEMS (Orbiting) --- */
        .nft-item {
            position: absolute;
            width: 60px; height: 60px;
            border-radius: 12px;
            background-size: contain; background-repeat: no-repeat; background-position: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transform-style: preserve-3d;
            
            /* Counter-rotation animation to keep them facing the user */
            animation: counterRotate 10s infinite linear;
        }

        /* Assigning files and starting positions in the orbit */
        .nft1 { 
            background-image: url('assets/nft1.svg'); 
            /* Position: Pushed out 140px on X (orbit width) */
            margin-left: -30px; margin-top: -30px; /* Centering */
            transform: rotateY(0deg) translateX(140px); 
        }
        .nft2 { 
            background-image: url('assets/nft2.svg'); 
            margin-left: -30px; margin-top: -30px;
            /* Position: Staggered by 120 degrees */
            transform: rotateY(120deg) translateX(140px); 
        }
        .nft3 { 
            background-image: url('assets/nft3.svg'); 
            margin-left: -30px; margin-top: -30px;
            /* Position: Staggered by 240 degrees */
            transform: rotateY(240deg) translateX(140px); 
        }

        /* Keyframes: Main container spins on Y axis */
        @keyframes orbitContainer {
            from { transform: rotateX(-5deg) rotateY(0deg); }
            to { transform: rotateX(-5deg) rotateY(360deg); }
        }

        /* Keyframes: Items spin negatively to stay facing forward */
        @keyframes counterRotate {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(-360deg); }
        }

        /* --- SPARKLES (Light Blinks) --- */
        .sparkle {
            position: absolute;
            width: 15px; height: 15px;
            color: white;
            opacity: 0;
            mask-image: url('assets/star.svg');
            -webkit-mask-image: url('assets/star.svg');
            background-color: currentColor;
            mask-size: contain; -webkit-mask-size: contain;
            mask-repeat: no-repeat; -webkit-mask-repeat: no-repeat;
            animation: sparklePulse 2s infinite;
        }

        @keyframes sparklePulse {
            0%, 100% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1) rotate(90deg); opacity: 0.8; filter: blur(1px); }
        }

        /* --- TEXTS & PRIZES --- */
        .win-title {
            font-family: 'Orbitron', sans-serif; font-size: 2.2rem;
            color: var(--gold); margin: 0;
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.6);
            letter-spacing: 1px;
        }

        .win-desc { color: rgba(255,255,255,0.7); margin: 10px 0 30px; line-height: 1.5; font-size: 1rem; }

        .prize-list {
            background: rgba(255,255,255,0.03); border-radius: 24px;
            padding: 20px; text-align: left;
            border: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 20px;
        }
        .prize-item { display: flex; align-items: center; gap: 16px; margin-bottom: 15px; }
        .prize-item:last-child { margin-bottom: 0; }
        
        .prize-icon-wrap { width: 36px; height: 36px; flex-shrink: 0; }
        .icon-svg {
            display: inline-block; width: 100%; height: 100%;
            background-color: currentColor;
            mask-repeat: no-repeat; mask-position: center; mask-size: contain;
            -webkit-mask-repeat: no-repeat; -webkit-mask-position: center; -webkit-mask-size: contain;
        }
        .mask-star { -webkit-mask-image: url('assets/star.svg'); mask-image: url('assets/star.svg'); }

        .prize-info b { display: block; color: var(--gold); font-size: 1rem; }
        .prize-info span { font-size: 0.8rem; color: rgba(255,255,255,0.4); }

        /* --- BUTTONS --- */
        .btn-main {
            width: 100%; background: none; border: 2px solid var(--gold);
            color: var(--gold); padding: 16px; border-radius: 16px;
            font-family: 'Orbitron', sans-serif; font-weight: 900;
            text-transform: uppercase; cursor: pointer; transition: all 0.2s;
            letter-spacing: 1px;
        }
        .btn-main:active { background: rgba(255,204,0,0.1); transform: scale(0.98); }

        .btn-tg {
            width: 100%; background: var(--tg-blue); color: white;
            border: none; padding: 16px; border-radius: 16px;
            font-family: 'Orbitron', sans-serif; font-weight: 900;
            text-decoration: none; display: block; box-sizing: border-box;
            text-transform: uppercase; text-align: center;
            letter-spacing: 1px;
        }

        .btn-close {
            margin-top: 20px; background: none; border: none;
            color: rgba(255,255,255,0.3); text-decoration: underline; cursor: pointer;
            font-size: 0.85rem;
        }

        /* --- PARTICLES (Confetti) --- */
        .p { position: absolute; pointer-events: none; z-index: 1001; color: var(--gold); }

        /* --- DEBUG TRIGGER --- */
        .debug-btn {
            position: fixed; bottom: 20px; right: 20px; z-index: 9999;
            background: var(--primary); border: none; color: white;
            padding: 12px 24px; border-radius: 50px;
            font-family: 'Orbitron', sans-serif; font-weight: 900;
            cursor: pointer; opacity: 0.7;
        }
    </style>
</head>
<body>

    <button class="debug-btn" onclick="startWinFlow()">TEST FX 🎟️</button>

    <div id="fxOverlay" class="fx-overlay">
        <div class="window-container">
            
            <div id="viewWin" class="reward-window">
                
                <div class="orbit-scene">
                    
                    <div class="sparkle" style="top: 20%; left: 20%; animation-delay: 0s;"></div>
                    <div class="sparkle" style="top: 70%; left: 80%; animation-delay: 0.5s;"></div>
                    <div class="sparkle" style="top: 50%; left: 10%; animation-delay: 1s;"></div>
                    <div class="sparkle" style="top: 10%; left: 70%; animation-delay: 1.5s; color: var(--silver);"></div>

                    <div class="main-ticket"></div>

                    <div class="orbit-wrapper">
                        <div class="nft-item nft1"></div>
                        <div class="nft-item nft2"></div>
                        <div class="nft-item nft3"></div>
                    </div>
                </div>

                <h1 class="win-title">EPIC WIN!</h1>
                <p class="win-desc">You've earned a ticket for the Seasonal Prize Draw!</p>
                <button class="btn-main" onclick="switchView('viewPrizes')">Show Seasonal Prizes</button>
                <button class="btn-close" onclick="closeAll()">Close</button>
            </div>

            <div id="viewPrizes" class="reward-window">
                <h2 style="font-family: 'Orbitron'; color: var(--gold); margin-bottom: 20px; letter-spacing: 1px;">PRIZE POOL</h2>
                <div class="prize-list">
                    <div class="prize-item">
                        <div class="prize-icon-wrap" style="background-image: url('assets/nft1.svg'); background-size: contain; border-radius: 8px;"></div>
                        <div class="prize-info">
                            <b>10x NFT Telegram Gifts</b>
                            <span>Randomly drawn collectible items</span>
                        </div>
                    </div>
                    <div class="prize-item">
                        <div class="prize-icon-wrap" style="color: var(--gold);">
                            <div class="icon-svg mask-star"></div>
                        </div>
                        <div class="prize-info">
                            <b>10x Packs of 100 Stars</b>
                            <span>Telegram currency rewards</span>
                        </div>
                    </div>
                </div>
                
                <a href="#" class="btn-tg" onclick="alert('Channel link...')">Check Channel for Rules</a>
                <button class="btn-close" onclick="closeAll()">Back to game</button>
            </div>

        </div>
    </div>

    <script>
        // Telegram API Mock
        const tg = window.Telegram?.WebApp || {
            HapticFeedback: { notificationOccurred: (t) => console.log('Haptic:', t) }
        };

        function startWinFlow() {
            document.getElementById('fxOverlay').classList.add('active');
            switchView('viewWin');
            
            // Big success vibration
            tg.HapticFeedback.notificationOccurred('success');
            
            // One-time confetti explosion
            spawnConfetti();
        }

        function switchView(v) {
            document.querySelectorAll('.reward-window').forEach(w => w.classList.remove('active'));
            document.getElementById(v).classList.add('active');
            // Small tick vibration when switching
            tg.HapticFeedback.notificationOccurred('light');
        }

        function closeAll() {
            document.getElementById('fxOverlay').classList.remove('active');
        }

        // Particle explosion logic (remains the same, creates "juice")
        function spawnConfetti() {
            for (let i = 0; i < 60; i++) {
                const p = document.createElement('div');
                p.className = 'p';
                
                const inner = document.createElement('div');
                inner.className = 'icon-svg mask-star';
                p.appendChild(inner);

                const size = Math.random() * 10 + 6;
                p.style.width = p.style.height = size + 'px';
                
                p.style.left = '50%';
                p.style.top = '50%';
                document.body.appendChild(p);

                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 400 + 150;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;
                const rot = Math.random() * 720 - 360;

                p.animate([
                    { transform: 'translate(-50%, -50%) scale(1) rotate(0deg)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0) rotate(${rot}deg)`, opacity: 0 }
                ], {
                    duration: Math.random() * 800 + 800,
                    easing: 'cubic-bezier(0, .9, .57, 1)'
                }).onfinish = () => p.remove();
            }
        }
    </script>
</body>
</html>
