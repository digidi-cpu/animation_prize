<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digit Game: SVG Ticket FX</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #05050f;
            --primary: #ff6b35;
            --gold: #ffcc00;
            --gold-dark: #b59410;
            --silver: #e0e0e0;
            --tg-blue: #24A1DE;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Debug Trigger */
        .debug-btn {
            position: fixed;
            bottom: 30px;
            z-index: 9999;
            background: var(--primary);
            border: none;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.5);
            cursor: pointer;
        }

        /* OVERLAY */
        .fx-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            transition: all 0.4s ease;
            backdrop-filter: blur(0px);
        }

        .fx-overlay.active {
            visibility: visible;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(10px);
        }

        /* WINDOWS */
        .window-container {
            width: 90%;
            max-width: 350px;
            position: relative;
        }

        .reward-window {
            text-align: center;
            display: none;
            animation: windowIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes windowIn {
            from { opacity: 0; transform: scale(0.7) translateY(50px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        #viewWin.active, #viewPrizes.active { display: block; }

        /* SVG TICKET VISUAL */
        .ticket-visual {
            width: 180px;
            height: 180px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 0 25px rgba(255, 204, 0, 0.4));
            animation: float 4s infinite ease-in-out;
        }

        .win-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            margin: 0;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.5);
            letter-spacing: 1px;
        }

        .win-desc {
            color: rgba(255,255,255,0.7);
            margin: 15px 0 35px;
            font-size: 1rem;
            line-height: 1.4;
        }

        /* PRIZE LIST */
        .prize-list {
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            padding: 24px;
            text-align: left;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .prize-item {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .prize-item:last-child { margin-bottom: 0; }

        .prize-icon { width: 40px; height: 40px; flex-shrink: 0; }
        .prize-info b { display: block; color: var(--gold); font-size: 1.05rem; }
        .prize-info span { font-size: 0.85rem; color: rgba(255,255,255,0.4); }

        /* BUTTONS */
        .btn-main {
            width: 100%;
            background: none;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 16px;
            border-radius: 16px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .btn-tg {
            width: 100%;
            background: var(--tg-blue);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            text-decoration: none;
            display: block;
            box-sizing: border-box;
            text-transform: uppercase;
        }

        .btn-close {
            margin-top: 25px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.3);
            text-decoration: underline;
            font-size: 0.85rem;
            cursor: pointer;
        }

        /* PARTICLES */
        .p { position: absolute; pointer-events: none; z-index: 1001; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-15px) rotate(3deg); }
        }
    </style>
</head>
<body>

    <button class="debug-btn" onclick="startWinFlow()">TEST ANIMATION 🎟️</button>

    <div id="fxOverlay" class="fx-overlay">
        <div class="window-container">
            
            <div id="viewWin" class="reward-window">
                <div class="ticket-visual">
                    <svg width="140" height="90" viewBox="0 0 140 90" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M10 0C4.47715 0 0 4.47715 0 10V35C4.41828 35 8 38.5817 8 43C8 47.4183 4.41828 51 0 51V80C0 85.5228 4.47715 90 10 90H130C135.523 90 140 85.5228 140 80V51C135.582 51 132 47.4183 132 43C132 38.5817 135.582 35 140 35V10C140 4.47715 135.523 0 130 0H10Z" fill="url(#ticketGrad)"/>
                        <path opacity="0.3" d="M100 0L80 90H95L115 0H100Z" fill="white"/>
                        <rect x="25" y="42" width="90" height="6" rx="3" fill="#866D08"/>
                        <defs>
                            <linearGradient id="ticketGrad" x1="0" y1="0" x2="140" y2="90" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#FFCC00"/>
                                <stop offset="1" stop-color="#B59410"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1 class="win-title">EPIC WIN!</h1>
                <p class="win-desc">You've earned a ticket for the Seasonal Prize Draw!</p>
                <button class="btn-main" onclick="switchView('viewPrizes')">Check Prizes</button>
                <button class="btn-close" onclick="closeAll()">Not now</button>
            </div>

            <div id="viewPrizes" class="reward-window">
                <h2 style="font-family: 'Orbitron'; color: var(--gold); margin-bottom: 25px;">SEASONAL PRIZES</h2>
                <div class="prize-list">
                    <div class="prize-item">
                        <div class="prize-icon">
                            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <rect width="32" height="32" rx="8" fill="#FF6B35" fill-opacity="0.2"/>
                                <path d="M16 6L18.5 13.5H26L20 18L22.5 25.5L16 21L9.5 25.5L12 18L6 13.5H13.5L16 6Z" fill="#FF6B35"/>
                                <rect x="9" y="14" width="14" height="10" rx="2" stroke="#FF6B35" stroke-width="2"/>
                            </svg>
                        </div>
                        <div class="prize-info"><b>10x NFT Telegram Gifts</b><span>Exclusive collectible items</span></div>
                    </div>
                    <div class="prize-item">
                        <div class="prize-icon">
                            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M16 4L19.5 12.5L28 13.5L21.5 19L23.5 27.5L16 23L8.5 27.5L10.5 19L4 13.5L12.5 12.5L16 4Z" fill="#FFCC00"/>
                                <circle cx="16" cy="16" r="14" stroke="#FFCC00" stroke-width="2" stroke-dasharray="4 2"/>
                            </svg>
                        </div>
                        <div class="prize-info"><b>10x Packs of 100 Stars</b><span>Telegram native currency</span></div>
                    </div>
                </div>
                
                <a href="#" class="btn-tg" style="margin-top: 25px;" onclick="alert('Open Channel...')">View in Channel</a>
                <button class="btn-close" onclick="closeAll()">Close</button>
            </div>

        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp || {
            HapticFeedback: { notificationOccurred: (t) => console.log('Haptic:', t) }
        };

        function startWinFlow() {
            const overlay = document.getElementById('fxOverlay');
            overlay.classList.add('active');
            switchView('viewWin');
            tg.HapticFeedback.notificationOccurred('success');
            spawnConfetti();
        }

        function switchView(viewId) {
            document.querySelectorAll('.reward-window').forEach(w => w.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            tg.HapticFeedback.notificationOccurred('light');
        }

        function closeAll() {
            document.getElementById('fxOverlay').classList.remove('active');
        }

        function spawnConfetti() {
            const colors = ['#FFCC00', '#FF6B35', '#FFFFFF'];
            // SVG Star template for particles
            const starSvg = `<svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7.5 0L9.18386 5.18237H14.6329L10.2245 8.38525L11.9084 13.5676L7.5 10.3647L3.09161 13.5676L4.77547 8.38525L0.367076 5.18237H5.81614L7.5 0Z" fill="currentColor"/></svg>`;

            for (let i = 0; i < 60; i++) {
                const p = document.createElement('div');
                p.className = 'p';
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                if (Math.random() > 0.3) {
                    p.innerHTML = starSvg;
                    p.style.color = color;
                } else {
                    p.style.width = p.style.height = (Math.random() * 6 + 4) + 'px';
                    p.style.background = color;
                    p.style.borderRadius = '50%';
                }

                p.style.left = '50%';
                p.style.top = '50%';
                document.body.appendChild(p);

                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 400 + 150;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;
                const rot = Math.random() * 360;

                p.animate([
                    { transform: `translate(-50%, -50%) scale(1) rotate(0deg)`, opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0) rotate(${rot}deg)`, opacity: 0 }
                ], {
                    duration: Math.random() * 1000 + 800,
                    easing: 'cubic-bezier(0, .9, .57, 1)'
                }).onfinish = () => p.remove();
            }
        }
    </script>
</body>
</html>
