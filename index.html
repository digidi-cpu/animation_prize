<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digit Game: Ticket FX Sandbox</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #05050f;
            --primary: #ff6b35;
            --gold: #ffcc00;
            --silver: #e0e0e0;
            --tg-blue: #24A1DE;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Кнопка запуска (видна только в песочнице) */
        .debug-btn {
            position: fixed;
            bottom: 30px;
            z-index: 9999;
            background: var(--primary);
            border: none;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.5);
            cursor: pointer;
        }

        /* ОСНОВНОЙ ОВЕРЛЕЙ */
        .fx-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            transition: all 0.4s ease;
            backdrop-filter: blur(0px);
        }

        .fx-overlay.active {
            visibility: visible;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
        }

        /* КОНТЕЙНЕР ДЛЯ ОКОН */
        .window-container {
            width: 90%;
            max-width: 350px;
            position: relative;
            perspective: 1000px;
        }

        /* ОБЩИЙ СТИЛЬ ОКОН */
        .reward-window {
            text-align: center;
            display: none; /* Скрыты по умолчанию */
            animation: windowIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes windowIn {
            from { opacity: 0; transform: scale(0.7) translateY(50px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ОКНО 1: ПОЗДРАВЛЕНИЕ */
        #viewWin.active { display: block; }

        .ticket-visual {
            width: 160px;
            height: 160px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--gold), #b59410);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 70px;
            position: relative;
            box-shadow: 0 0 50px rgba(255, 204, 0, 0.4);
            animation: float 3s infinite ease-in-out;
            transform-style: preserve-3d;
        }

        .ticket-visual::after {
            content: '';
            position: absolute;
            inset: -20px;
            background: radial-gradient(circle, rgba(255,204,0,0.2) 0%, transparent 70%);
            animation: pulseGlow 2s infinite;
        }

        .win-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            margin: 0;
            color: var(--gold);
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.5);
        }

        .win-desc {
            color: rgba(255,255,255,0.7);
            margin: 15px 0 30px;
            line-height: 1.4;
        }

        /* ОКНО 2: ПРИЗЫ */
        #viewPrizes.active { display: block; }

        .prize-list {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            text-align: left;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .prize-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .prize-icon { font-size: 24px; width: 30px; }
        .prize-info b { display: block; color: var(--gold); }
        .prize-info span { font-size: 0.8rem; color: rgba(255,255,255,0.5); }

        /* КНОПКИ */
        .btn-main {
            width: 100%;
            background: none;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 15px;
            border-radius: 15px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .btn-tg {
            width: 100%;
            background: var(--tg-blue);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            text-decoration: none;
            display: block;
            box-sizing: border-box;
        }

        .btn-close {
            margin-top: 20px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.3);
            text-decoration: underline;
            cursor: pointer;
        }

        /* ЧАСТИЦЫ */
        .p {
            position: absolute;
            pointer-events: none;
            z-index: 1001;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotateY(0deg); }
            50% { transform: translateY(-10px) rotateY(10deg); }
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 1; }
        }
    </style>
</head>
<body>

    <button class="debug-btn" onclick="startWinFlow()">TEST ANIMATION 🎟️</button>

    <div id="fxOverlay" class="fx-overlay">
        <div class="window-container">
            
            <div id="viewWin" class="reward-window">
                <div class="ticket-visual">🎟️</div>
                <h1 class="win-title">EPIC WIN!</h1>
                <p class="win-desc">Ты заработал билет на участие в сезонном розыгрыше призов!</p>
                <button class="btn-main" onclick="switchView('viewPrizes')">ЧТО Я МОГУ ВЫИГРАТЬ?</button>
                <button class="btn-close" onclick="closeAll()">Закрыть</button>
            </div>

            <div id="viewPrizes" class="reward-window">
                <h2 style="font-family: 'Orbitron'; color: var(--gold);">СЕЗОННЫЕ ПРИЗЫ</h2>
                <div class="prize-list">
                    <div class="prize-item">
                        <div class="prize-icon">⭐</div>
                        <div class="prize-info"><b>5,000 Telegram Stars</b><span>Разделят топ-10 игроков</span></div>
                    </div>
                    <div class="prize-item">
                        <div class="prize-icon">💎</div>
                        <div class="prize-info"><b>10x Telegram Premium</b><span>Случайный выбор по билетам</span></div>
                    </div>
                    <div class="prize-item">
                        <div class="prize-icon">🎟️</div>
                        <div class="prize-info"><b>Exclusive NFT</b><span>Для самых активных</span></div>
                    </div>
                </div>
                <p style="font-size: 0.8rem; margin: 20px 0; color: rgba(255,255,255,0.5);">Результаты розыгрыша будут опубликованы в нашем канале.</p>
                <a href="#" class="btn-tg" onclick="alert('Переход в канал...')">ПОДРОБНЕЕ В КАНАЛЕ</a>
                <button class="btn-close" onclick="closeAll()">Вернуться в игру</button>
            </div>

        </div>
    </div>

    <script>
        // Имитация Telegram WebApp для браузера
        const tg = window.Telegram?.WebApp || {
            HapticFeedback: { notificationOccurred: (t) => console.log('Haptic:', t) }
        };

        function startWinFlow() {
            const overlay = document.getElementById('fxOverlay');
            overlay.classList.add('active');
            switchView('viewWin');
            
            // Вибрация
            tg.HapticFeedback.notificationOccurred('success');
            
            // Взрыв конфетти
            spawnConfetti();
        }

        function switchView(viewId) {
            document.querySelectorAll('.reward-window').forEach(w => w.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            tg.HapticFeedback.notificationOccurred('light');
        }

        function closeAll() {
            document.getElementById('fxOverlay').classList.remove('active');
        }

        function spawnConfetti() {
            const colors = ['#ffcc00', '#ff6b35', '#ffffff'];
            for (let i = 0; i < 60; i++) {
                const p = document.createElement('div');
                p.className = 'p';
                
                // Случайная форма: звезда или кружок
                if (Math.random() > 0.5) {
                    p.innerHTML = '⭐';
                    p.style.fontSize = (Math.random() * 15 + 10) + 'px';
                } else {
                    p.style.width = p.style.height = (Math.random() * 8 + 4) + 'px';
                    p.style.background = colors[Math.floor(Math.random() * colors.length)];
                    p.style.borderRadius = '50%';
                }

                p.style.left = '50%';
                p.style.top = '50%';
                document.body.appendChild(p);

                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 400 + 150;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;

                p.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`, opacity: 0 }
                ], {
                    duration: Math.random() * 800 + 800,
                    easing: 'cubic-bezier(0, .9, .57, 1)'
                }).onfinish = () => p.remove();
            }
        }
    </script>
</body>
</html>
