<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digit Game: True Solar Orbit</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #030309;
            --gold: #ffcc00;
            --gold-dark: #b59410;
        }

        body {
            margin: 0; background-color: var(--bg);
            perspective: 1200px; /* Глубина обзора всей страницы */
            overflow: hidden;
        }

        .fx-overlay {
            position: fixed; inset: 0;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.95);
            visibility: hidden; opacity: 0; transition: 0.5s;
        }
        .fx-overlay.active { visibility: visible; opacity: 1; backdrop-filter: blur(15px); }

        /* =========================================
           ЧЕСТНАЯ 3D СЦЕНА
           ========================================= */
        .solar-system {
            position: relative;
            width: 400px; height: 300px;
            display: flex; justify-content: center; align-items: center;
            /* КРИТИЧЕСКИ ВАЖНО: сохраняем 3D для вложенных элементов */
            transform-style: preserve-3d;
            transform: rotateX(15deg); /* Наклон всей системы для вида сверху */
        }

        /* ЦЕНТРАЛЬНЫЙ ТИКЕТ (СОЛНЦЕ) */
        .sun-ticket {
            position: absolute;
            width: 180px; height: 110px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            mask: url('assets/ticket.svg') no-repeat center / contain;
            -webkit-mask: url('assets/ticket.svg') no-repeat center / contain;
            filter: drop-shadow(0 0 30px rgba(255, 204, 0, 0.6));
            /* Он стоит в нулевой точке 3D */
            transform: translateZ(0); 
            animation: sunFloat 4s infinite ease-in-out;
        }

        @keyframes sunFloat {
            0%, 100% { transform: translateZ(0) translateY(0) rotate(-1deg); }
            50% { transform: translateZ(10px) translateY(-10px) rotate(2deg); }
        }

        /* КОНТЕЙНЕР ОРБИТЫ */
        .orbit-path {
            position: absolute;
            width: 100%; height: 100%;
            transform-style: preserve-3d;
            /* Вращаем сам контейнер орбиты */
            animation: orbitRotation 12s infinite linear;
        }

        @keyframes orbitRotation {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        /* NFT (ПЛАНЕТЫ) */
        .planet-nft {
            position: absolute;
            width: 60px; height: 60px;
            top: 50%; left: 50%;
            margin: -30px 0 0 -30px;
            background-size: contain; background-repeat: no-repeat;
            transform-style: preserve-3d;
        }

        /* Расставляем планеты по радиусу и компенсируем вращение */
        .nft-orbit-wrap {
            position: absolute;
            inset: 0;
            transform-style: preserve-3d;
        }

        /* Магия: мы отодвигаем NFT от центра по оси Z. 
           Когда родитель (orbit-path) крутится по Y, 
           Z превращается в X и обратно, создавая круг.
        */
        .n1 { transform: rotateY(0deg) translateZ(160px); }
        .n2 { transform: rotateY(90deg) translateZ(160px); }
        .n3 { transform: rotateY(180deg) translateZ(160px); }
        .n4 { transform: rotateY(270deg) translateZ(160px); }

        .icon-nft {
            width: 60px; height: 60px;
            background-size: contain;
            /* Компенсируем вращение орбиты, чтобы картинка всегда смотрела на нас */
            animation: counterRotate 12s infinite linear;
        }

        @keyframes counterRotate {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(-360deg); }
        }

        /* Блестки (Sparkles) на фоне */
        .star-sparkle {
            position: absolute;
            width: 10px; height: 10px;
            background: white;
            mask: url('assets/star.svg') no-repeat center / contain;
            -webkit-mask: url('assets/star.svg') no-repeat center / contain;
            animation: sparkle 2s infinite ease-in-out;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 0.8; transform: scale(1.2) rotate(45deg); }
        }

        /* Остальные стили кнопок и текстов (как в прошлом коде) */
        .win-title { font-family: 'Orbitron'; color: var(--gold); font-size: 2rem; margin-top: 20px; }
        .btn-main { border: 2px solid var(--gold); color: var(--gold); padding: 15px 30px; background: none; font-family: 'Orbitron'; cursor: pointer; border-radius: 12px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="fxOverlay" class="fx-overlay active">
        <div style="text-align: center;">
            <div class="solar-system">
                <div class="star-sparkle" style="top:10%; left:20%; animation-delay: 0s;"></div>
                <div class="star-sparkle" style="top:80%; left:70%; animation-delay: 0.5s;"></div>
                <div class="star-sparkle" style="top:30%; left:85%; animation-delay: 1.2s;"></div>

                <div class="sun-ticket"></div>

                <div class="orbit-path">
                    <div class="nft-orbit-wrap n1"><div class="icon-nft" style="background-image: url('assets/nft1.svg');"></div></div>
                    <div class="nft-orbit-wrap n2"><div class="icon-nft" style="background-image: url('assets/nft2.svg');"></div></div>
                    <div class="nft-orbit-wrap n3"><div class="icon-nft" style="background-image: url('assets/nft3.svg');"></div></div>
                    <div class="nft-orbit-wrap n4"><div class="icon-nft" style="background-image: url('assets/nft.svg');"></div></div>
                </div>
            </div>

            <h1 class="win-title">EPIC WIN!</h1>
            <p style="color: rgba(255,255,255,0.7);">You've earned a ticket for the Seasonal Draw!</p>
            <button class="btn-main">WHAT CAN I WIN?</button>
        </div>
    </div>

</body>
</html>
